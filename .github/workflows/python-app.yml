name: CI/CD FastAPI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      LOGIN: teste
      PASSWORD: teste
      DATABASE_URL: sqlite:///./test.db

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-root --no-interaction

      - name: Run tests
        run: poetry run pytest

      - name: Build Docker image
        run: docker build -t fastapi-app:latest .

      - name: Run Docker container
        run: docker run -d --name fastapi-app -p 8000:8000 -e LOGIN=teste -e PASSWORD=teste -e DATABASE_URL=sqlite:///./test.db fastapi-app:latest

      - name: Check container
        run: docker ps | grep fastapi-app

      - name: Remove container
        if: always()
        run: docker rm -f fastapi-app || true
